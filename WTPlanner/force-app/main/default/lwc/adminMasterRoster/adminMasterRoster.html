<template>
    <lightning-card title="Master Roster" icon-name="standard:user">
        <div slot="actions">
            <lightning-button
                label="Refresh"
                icon-name="utility:refresh"
                onclick={handleRefresh}
                variant="neutral"
            ></lightning-button>
        </div>

        <div class="slds-p-around_medium">
            <!-- Filter Bar -->
            <div class="filter-bar slds-m-bottom_medium">
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col slds-size_1-of-3 slds-medium-size_1-of-6 slds-m-bottom_small">
                        <lightning-combobox
                            name="sessionType"
                            label="Session Type"
                            value={filterSessionType}
                            options={sessionTypeOptions}
                            onchange={handleFilterSessionType}
                            variant="label-stacked"
                        ></lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-3 slds-medium-size_1-of-6 slds-m-bottom_small">
                        <lightning-combobox
                            name="session"
                            label="Session"
                            value={filterSession}
                            options={sessionOptions}
                            onchange={handleFilterSession}
                            variant="label-stacked"
                        ></lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-3 slds-medium-size_1-of-6 slds-m-bottom_small">
                        <lightning-combobox
                            name="timeSlot"
                            label="Time Slot"
                            value={filterTimeSlot}
                            options={timeSlotFilterOptions}
                            onchange={handleFilterTimeSlot}
                            variant="label-stacked"
                        ></lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-3 slds-medium-size_1-of-6 slds-m-bottom_small">
                        <lightning-combobox
                            name="minStaffing"
                            label="Min Staffing Reached"
                            value={filterMinStaffing}
                            options={minStaffingOptions}
                            onchange={handleFilterMinStaffing}
                            variant="label-stacked"
                        ></lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-3 slds-medium-size_1-of-6 slds-m-bottom_small">
                        <lightning-combobox
                            name="overlaps"
                            label="Has Overlaps"
                            value={filterOverlaps}
                            options={overlapOptions}
                            onchange={handleFilterOverlaps}
                            variant="label-stacked"
                        ></lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-3 slds-medium-size_1-of-6 slds-m-bottom_small">
                        <lightning-input
                            label="Search User"
                            value={filterUser}
                            onchange={handleFilterUser}
                            placeholder="Name..."
                            type="search"
                            variant="label-stacked"
                        ></lightning-input>
                    </div>
                </div>
                <template if:true={hasActiveFilters}>
                    <div class="slds-m-top_x-small">
                        <lightning-button
                            label="Clear Filters"
                            icon-name="utility:close"
                            variant="base"
                            onclick={handleClearFilters}
                        ></lightning-button>
                    </div>
                </template>
            </div>

            <!-- Tab Navigation -->
            <lightning-tabset active-tab-value={activeTab} onselect={handleTabChange}>
                <!-- By Person Tab -->
                <lightning-tab label="By Person" value="byPerson">
                    <template if:true={isLoading}>
                        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                    </template>

                    <template if:true={hasPersonRoster}>
                        <div class="roster-matrix-container">
                                <table class="slds-table slds-table_bordered roster-table">
                                    <thead>
                                        <tr class="slds-line-height_reset">
                                            <th class="sticky-col" scope="col">
                                                <div class="slds-truncate" title="User">User</div>
                                            </th>
                                            <template for:each={timeSlots} for:item="slot">
                                                <th key={slot} scope="col">
                                                    <div class="slds-truncate" title={slot}>{slot}</div>
                                                </th>
                                            </template>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={personRows} for:item="row">
                                            <tr key={row.userName}>
                                                <th class="sticky-col" scope="row">
                                                    <div class="slds-truncate" title={row.userName}>{row.userName}</div>
                                                </th>
                                                <template for:each={row.slotCells} for:item="cell">
                                                    <td key={cell.key}>
                                                        <template if:true={cell.hasValue}>
                                                            <div class="popover-container"
                                                                 onmouseenter={handlePopoverShow}
                                                                 onmouseleave={handlePopoverHide}>
                                                                <div class="cell-badges">
                                                                    <template for:each={cell.items} for:item="item">
                                                                        <div key={item.key} class="badge-row">
                                                                            <lightning-badge label={item.badgeLabel}></lightning-badge>
                                                                            <template if:true={item.hasOverlap}>
                                                                                <lightning-icon
                                                                                    icon-name="utility:warning"
                                                                                    size="xx-small"
                                                                                    variant="warning"
                                                                                    class="slds-m-left_xx-small overlap-icon"
                                                                                ></lightning-icon>
                                                                            </template>
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                                <div class="popover-content" role="tooltip">
                                                                    <template for:each={cell.items} for:item="item">
                                                                        <div key={item.key} class="popover-session">
                                                                            <div class="popover-header">{item.badgeLabel}</div>
                                                                            <div class="popover-row">
                                                                                <span class="popover-label">Time:</span>
                                                                                <span>{item.timeRange}</span>
                                                                            </div>
                                                                            <div class="popover-row">
                                                                                <span class="popover-label">Location:</span>
                                                                                <span>{item.location}</span>
                                                                            </div>
                                                                            <div class="popover-row">
                                                                                <span class="popover-label">Staffing:</span>
                                                                                <span>{item.staffingLabel}</span>
                                                                            </div>
                                                                            <div class="popover-row">
                                                                                <span class="popover-label">Status:</span>
                                                                                <span class={item.statusClass}>{item.status}</span>
                                                                            </div>
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </td>
                                                </template>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                        </div>
                    </template>

                    <template if:false={hasPersonRoster}>
                        <div class="slds-text-align_center slds-p-vertical_large">
                            <p class="slds-text-color_weak">No roster data matches the current filters.</p>
                        </div>
                    </template>
                </lightning-tab>

                <!-- By Shift Tab -->
                <lightning-tab label="By Shift" value="byShift">
                    <template if:true={isLoading}>
                        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                    </template>

                    <template if:true={hasShiftRoster}>
                        <div class="shift-table-container">
                            <table class="slds-table slds-table_bordered slds-table_striped shift-table">
                                <thead>
                                    <tr>
                                        <th scope="col">Session</th>
                                        <th scope="col">Location</th>
                                        <th scope="col">Time Slot</th>
                                        <th scope="col">Type</th>
                                        <th scope="col">Assigned To</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={filteredShifts} for:item="shift">
                                        <tr key={shift.id}>
                                            <td>
                                                <span class="shift-session-name">{shift.sessionName}</span>
                                            </td>
                                            <td class="slds-text-color_weak">{shift.sessionLocation}</td>
                                            <td>
                                                <span class="shift-time-slot">{shift.timeSlot}</span>
                                            </td>
                                            <td>
                                                <lightning-badge label={shift.sessionType}></lightning-badge>
                                            </td>
                                            <td>
                                                <template if:true={shift.isAssigned}>
                                                    <div class="assigned-user-inline">
                                                        <lightning-icon icon-name="standard:avatar" size="xx-small"></lightning-icon>
                                                        <span>{shift.assignedUserName}</span>
                                                        <template if:true={shift.hasOverlap}>
                                                            <lightning-badge label="Overlap" variant="warning" class="slds-m-left_xx-small"></lightning-badge>
                                                        </template>
                                                    </div>
                                                </template>
                                                <template if:false={shift.isAssigned}>
                                                    <span class="unassigned-label">Unassigned</span>
                                                </template>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>

                    <template if:false={hasShiftRoster}>
                        <div class="slds-text-align_center slds-p-vertical_large">
                            <p class="slds-text-color_weak">No shifts match the current filters.</p>
                        </div>
                    </template>
                </lightning-tab>
            </lightning-tabset>
        </div>
    </lightning-card>
</template>
