<template>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleCancel}>
                <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                <span class="slds-assistive-text">Close</span>
            </button>

            <div class="slds-modal__header">
                <h2 class="slds-modal__title slds-hyphenate">New Staffing User</h2>
            </div>

            <div class="slds-modal__content slds-p-around_medium">
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <lightning-input
                            label="First Name"
                            value={firstName}
                            onchange={handleFirstNameChange}
                            required
                            data-id="firstName"
                        ></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <lightning-input
                            label="Last Name"
                            value={lastName}
                            onchange={handleLastNameChange}
                            required
                            data-id="lastName"
                        ></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                        <lightning-input
                            label="Email"
                            type="email"
                            value={email}
                            onchange={handleEmailChange}
                            required
                            data-id="email"
                        ></lightning-input>
                    </div>
                </div>

                <template if:true={hasPreview}>
                    <div class="slds-box slds-box_x-small slds-theme_shade slds-m-top_small">
                        <p class="slds-text-body_small slds-text-color_weak">
                            <strong>Username:</strong> {generatedUsername}
                        </p>
                        <p class="slds-text-body_small slds-text-color_weak">
                            <strong>Alias:</strong> {generatedAlias}
                        </p>
                        <p class="slds-text-body_small slds-text-color_weak">
                            <strong>Profile:</strong> Standard User
                        </p>
                        <p class="slds-text-body_small slds-text-color_weak">
                            <strong>Permission Set:</strong> Staffing App Employee
                        </p>
                    </div>
                </template>
            </div>

            <div class="slds-modal__footer">
                <lightning-button
                    label="Cancel"
                    onclick={handleCancel}
                    class="slds-m-right_x-small"
                    disabled={isCreating}
                ></lightning-button>
                <lightning-button
                    label="Create User"
                    variant="brand"
                    onclick={handleCreate}
                    disabled={isCreating}
                ></lightning-button>
            </div>

            <template if:true={isCreating}>
                <lightning-spinner alternative-text="Creating user..." size="medium"></lightning-spinner>
            </template>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
